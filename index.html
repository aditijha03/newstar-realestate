<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      const theme = localStorage.getItem('theme');
      if (theme === 'light') {
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
      }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B1120" />

    <!-- Primary Meta -->
    <title>New Star Real Estate | Find Your Perfect Home & Investment</title>
    <meta
      name="description"
      content="New Star Real Estate helps you find your perfect home and investment. Explore premium residential and commercial properties with expert guidance."
    />
    <meta name="keywords" content="real estate, property, buy, sell, rent, luxury homes, investment, New Star" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://newstarrealestate.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://newstarrealestate.com/" />
    <meta property="og:title" content="New Star Real Estate | Find Your Perfect Home & Investment" />
    <meta
      property="og:description"
      content="10+ Years of experience. 150+ Properties Sold. 250+ Happy Clients. Trusted luxury real estate experts."
    />
    <meta property="og:image" content="https://newstarrealestate.com/og-image.jpg" />
    <meta property="og:site_name" content="New Star Real Estate" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@NewStarRealty" />
    <meta name="twitter:title" content="New Star Real Estate | Find Your Perfect Home & Investment" />
    <meta
      name="twitter:description"
      content="10+ Years of experience. 150+ Properties Sold. 250+ Happy Clients."
    />
    <meta name="twitter:image" content="https://newstarrealestate.com/og-image.jpg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "RealEstateAgent",
        "name": "New Star Real Estate",
        "url": "https://newstarrealestate.com",
        "telephone": "+91-98765-43210",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Mumbai",
          "addressCountry": "IN"
        },
        "description": "Luxury real estate agency with 10+ years of experience helping clients buy, sell and rent premium properties.",
        "foundingDate": "2015"
      }
    </script>

    <!-- Preconnect for Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
